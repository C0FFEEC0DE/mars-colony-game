name: 🛡️ Anti-Cheat
# Validates code/config changes for fairness, skips pure game-state updates

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'world_state.json'
      - 'README.md'
      - 'players/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'world_state.json'
      - 'README.md'
      - 'players/**'

jobs:
  anti-cheat:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for checking

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🔍 Check for cheating
        run: |
          echo "🕵️ Checking recent commits..."
          python3 game/server/anticheat/validate.py

      - name: 📊 Statistics check
        run: |
          echo "📈 Analyzing game statistics..."
          python3 game/server/anticheat/stats_check.py

      - name: 🚫 Ban if detected
        if: failure()
        run: |
          echo "🚫 CHEATER DETECTED!"
          python3 game/server/anticheat/ban.py --player ${{ github.actor }}
