name: 🪐 Game Loop

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: mars-game-loop-main
  cancel-in-progress: false

jobs:
  game-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🕒 Compute schedule flags
        id: schedule
        run: |
          hour=$(date -u +%H)
          echo "hour=$hour" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_random=true" >> "$GITHUB_OUTPUT"
            echo "run_mars_day=true" >> "$GITHUB_OUTPUT"
            echo "run_ai_daily=true" >> "$GITHUB_OUTPUT"
            echo "run_summary=true" >> "$GITHUB_OUTPUT"
          else
            if [ $((10#$hour % 12)) -eq 0 ]; then
              echo "run_random=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_random=false" >> "$GITHUB_OUTPUT"
            fi

            if [ "$hour" = "06" ]; then
              echo "run_mars_day=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_mars_day=false" >> "$GITHUB_OUTPUT"
            fi

            if [ "$hour" = "00" ]; then
              echo "run_ai_daily=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_ai_daily=false" >> "$GITHUB_OUTPUT"
            fi

            if [ "$hour" = "00" ]; then
              echo "run_summary=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_summary=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: 💰 Economy stage
        run: |
          python3 game/server/economy/consumption.py
          python3 game/server/economy/production.py
          python3 game/server/economy/energy.py
          python3 game/server/economy/maintenance.py
          python3 game/server/economy/market.py

      - name: 💾 Save economy stage
        run: |
          git config user.name 'Mars Server'
          git config user.email 'mars@red-planet.game'
          git add world_state.json players/
          if ! git diff --staged --quiet; then
            git commit -m "💰 Economy: $(date +%H:%M)"
            git pull --rebase origin main
            git push
          fi

      - name: ⚡ Random event stage
        if: ${{ steps.schedule.outputs.run_random == 'true' }}
        run: |
          EVENT_TYPE=$((RANDOM % 10))

          case $EVENT_TYPE in
            0)
              python3 game/server/events/meteor_shower.py
              ;;
            1)
              python3 game/server/events/discovery.py
              ;;
            2)
              python3 game/server/events/sandstorm.py
              ;;
            3)
              python3 game/server/events/ice_discovery.py
              ;;
            4)
              python3 game/server/events/solar_flare.py
              ;;
            5)
              python3 game/server/events/traders.py
              ;;
            *)
              echo "Quiet day on Mars"
              ;;
          esac

      - name: 💾 Save random event stage
        if: ${{ steps.schedule.outputs.run_random == 'true' }}
        run: |
          git config user.name 'Mars Server'
          git config user.email 'mars@red-planet.game'
          git add world_state.json players/
          if ! git diff --staged --quiet; then
            git commit -m "⚡ Event: $(date)"
            git pull --rebase origin main
            git push
          fi

      - name: 🚀 Mars day stage
        if: ${{ steps.schedule.outputs.run_mars_day == 'true' }}
        run: |
          python3 game/server/day_cycle.py
          python3 game/server/weather.py
          python3 game/server/storms.py
          python3 game/server/leaderboard.py

      - name: 💾 Save Mars day stage
        if: ${{ steps.schedule.outputs.run_mars_day == 'true' }}
        run: |
          git config user.name 'Mars Server'
          git config user.email 'mars@red-planet.game'
          git add world_state.json players/
          if ! git diff --staged --quiet; then
            git commit -m "🌅 Mars Day $(date +%s)"
            git pull --rebase origin main
            git push
          fi

      - name: 🤖 Daily AI stage
        if: ${{ steps.schedule.outputs.run_ai_daily == 'true' }}
        run: |
          python3 game/server/ai_content.py --daily

      - name: 💾 Save daily AI stage
        if: ${{ steps.schedule.outputs.run_ai_daily == 'true' }}
        run: |
          git config user.name 'Mars Server'
          git config user.email 'mars@red-planet.game'
          git add world_state.json
          if ! git diff --staged --quiet; then
            git commit -m "🤖 AI daily briefing: $(date +%F)"
            git pull --rebase origin main
            git push
          fi

      - name: 📘 World summary stage
        if: ${{ steps.schedule.outputs.run_summary == 'true' }}
        run: |
          python3 game/server/update_readme.py

      - name: 💾 Save world summary stage
        if: ${{ steps.schedule.outputs.run_summary == 'true' }}
        run: |
          git config user.name 'Mars Server'
          git config user.email 'mars@red-planet.game'
          git add README.md world_state.json
          if ! git diff --staged --quiet; then
            git commit -m "📘 Daily world summary: $(date +%F)"
            git pull --rebase origin main
            git push
          fi
