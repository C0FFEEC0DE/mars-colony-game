name: 🚀 Mars Day Cycle
# Reusable Mars Day stage for the main game loop

on:
  workflow_call:

jobs:
  mars-day-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📊 Update world state
        run: |
          python3 game/server/day_cycle.py

      - name: 🌍 Check weather
        run: |
          echo "🌡️ Checking weather conditions..."
          python3 game/server/weather.py

      - name: 💨 Check sandstorms
        run: |
          echo "🌪️ Checking meteorological conditions..."
          python3 game/server/storms.py

      - name: 📈 Update leaderboard
        run: |
          python3 game/server/leaderboard.py

      - name: 💾 Save changes
        run: |
          git config user.name 'Mars Server'
          git config user.email 'mars@red-planet.game'
          git add world_state.json players/
          if ! git diff --staged --quiet; then
            git commit -m "🌅 Mars Day $(date +%s)"
            git pull --rebase origin main
            git push
          fi
