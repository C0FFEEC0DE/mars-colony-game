name: ⚡ Random Events
# Reusable random event stage for the main game loop

on:
  workflow_call:

jobs:
  random-event:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🎲 Generate random event
        id: event
        run: |
          EVENT_TYPE=$((RANDOM % 10))

          case $EVENT_TYPE in
            0)
              echo "🌠 METEOR SHOWER!"
              python3 game/server/events/meteor_shower.py
              ;;
            1)
              echo "🔍 DISCOVERY!"
              python3 game/server/events/discovery.py
              ;;
            2)
              echo "🌪️ SANDSTORM!"
              python3 game/server/events/sandstorm.py
              ;;
            3)
              echo "💧 UNDERGROUND ICE!"
              python3 game/server/events/ice_discovery.py
              ;;
            4)
              echo "⚡ SOLAR FLARE!"
              python3 game/server/events/solar_flare.py
              ;;
            5)
              echo "🛸 TRADERS!"
              python3 game/server/events/traders.py
              ;;
            *)
              echo "📅 Quiet day on Mars"
              ;;
          esac

      - name: 💾 Save
        run: |
          git config user.name 'Mars Server'
          git config user.email 'mars@red-planet.game'
          git add world_state.json players/
          if ! git diff --staged --quiet; then
            git commit -m "⚡ Event: $(date)"
            git pull --rebase origin main
            git push
          fi
