name: 🧪 Automated Tests
# Run on push/PR, but skip pure game-state updates to save Actions minutes

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'world_state.json'
      - 'README.md'
      - 'players/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'world_state.json'
      - 'README.md'
      - 'players/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install pyyaml

      - name: 🧪 Run automated tests
        run: |
          python3 test_game.py > test_output.txt 2>&1
          exit_code=$?
          cat test_output.txt
          exit $exit_code

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test_output.txt
