name: 📘 Daily World Summary
# Reusable README snapshot stage for the main game loop

on:
  workflow_call:

jobs:
  refresh-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📘 Build daily README snapshot
        run: |
          python3 game/server/update_readme.py

      - name: 💾 Save
        run: |
          git config user.name 'Mars Server'
          git config user.email 'mars@red-planet.game'
          git add README.md world_state.json
          if ! git diff --staged --quiet; then
            git commit -m "📘 Daily world summary: $(date +%F)"
            git pull --rebase origin main
            git push
          fi
